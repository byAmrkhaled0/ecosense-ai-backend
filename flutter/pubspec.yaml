name: ecosense
description: AI-powered plant health monitoring system
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Provider & State Management
  provider: ^6.1.5+1
  
  # Networking
  dio: ^5.3.0
  http: ^1.2.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Fonts
  google_fonts: ^6.1.0
  
  # Animations
  animate_do: ^3.1.2
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.0.0
  
  # Responsive Design
  flutter_screenutil: ^5.9.0
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
